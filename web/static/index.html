<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projector Agent</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0e1117;
      --fg: #e6edf3;
      --muted: #7d8590;
      --card: #161b22;
      --card-2: #21262d;
      --accent: #2f81f7;
      --accent-fg: #ffffff;
      --ok: #2da44e;
      --err: #f85149;
      --warn: #d29922;
      --radius-lg: 18px;
      --radius-sm: 6px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      overflow: hidden;
      display: flex;
    }
    .chat-wrap {
      flex: 1;
      min-width: 0;
      display: flex;
      justify-content: center;
    }
    .app {
      width: 100%;
      max-width: 760px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    /* Right-side mobile log panel */
    .log-panel {
      width: 400px;
      flex-shrink: 0;
      height: 100vh;
      border-left: 1px solid var(--card);
      background: #0a0d12;
      display: flex;
      flex-direction: column;
      transition: width 0.2s, border-left-color 0.2s;
      position: relative;
    }
    .log-panel.collapsed { width: 0; border-left-color: transparent; overflow: hidden; }
    /* Drag handle, sitting on the panel's left edge */
    .resize-handle {
      position: absolute;
      left: -3px;
      top: 0;
      bottom: 0;
      width: 6px;
      cursor: col-resize;
      background: transparent;
      transition: background 0.12s;
      z-index: 5;
    }
    .resize-handle:hover, .resize-handle.dragging { background: var(--accent); }
    .log-panel.collapsed .resize-handle { display: none; }
    /* While dragging, lock the cursor + suppress transitions for snappy feel. */
    body.resizing { cursor: col-resize !important; user-select: none; }
    body.resizing .log-panel { transition: none; }
    body.resizing * { cursor: col-resize !important; }
    .log-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 14px;
      border-bottom: 1px solid var(--card);
    }
    .log-panel-header h2 {
      font-size: 13px;
      margin: 0;
      flex: 1;
      color: var(--fg);
      font-weight: 600;
    }
    .log-panel-header .icon-btn { width: 26px; height: 26px; font-size: 13px; }
    .log-stream {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 11px;
      line-height: 1.55;
    }
    .log-stream::-webkit-scrollbar { width: 8px; }
    .log-stream::-webkit-scrollbar-thumb { background: var(--card-2); border-radius: 4px; }
    .log-empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 16px;
      font-family: -apple-system, sans-serif;
      font-size: 12px;
    }
    .log-section { padding: 4px 0; }
    .log-section + .log-section { border-top: 1px dashed var(--card); margin-top: 4px; }
    .log-section-head {
      padding: 6px 14px 4px;
      color: var(--muted);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: -apple-system, sans-serif;
    }
    .log-section-head .name {
      font-family: ui-monospace, SFMono-Regular, monospace;
      text-transform: none;
      letter-spacing: 0;
      color: var(--fg);
      font-size: 11px;
    }
    .log-section-head .status {
      margin-left: auto;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 8px;
    }
    .log-section-head .status.running {
      color: var(--accent);
      background: rgba(47, 129, 247, 0.12);
    }
    .log-section-head .status.ok { color: var(--ok); background: rgba(45, 164, 78, 0.12); }
    .log-section-head .status.err { color: var(--err); background: rgba(248, 81, 73, 0.12); }
    .log-line {
      padding: 1px 14px;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log-line.w { color: #d29922; }
    .log-line.e, .log-line.f { color: #ff7b72; }
    .log-line.d, .log-line.v { color: var(--muted); }
    .log-line .lvl {
      display: inline-block;
      width: 10px;
      color: var(--muted);
      margin-right: 4px;
    }

    /* On smaller viewports the panel takes over too much room — auto-hide. */
    @media (max-width: 1100px) {
      .log-panel { width: 0; border-left-color: transparent; overflow: hidden; }
      .log-panel.force-open { width: 360px; border-left-color: var(--card); }
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 4px;
      border-bottom: 1px solid var(--card);
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2f81f7, #6e40c9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 27px;
      flex-shrink: 0;
    }
    .header-text { flex: 1; min-width: 0; }
    h1 { font-size: 22px; margin: 0; font-weight: 600; }
    .model-tag {
      font-size: 14px;
      font-weight: 400;
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--card-2);
      padding: 2px 8px;
      border-radius: 6px;
      margin-left: 8px;
      vertical-align: middle;
      font-family: ui-monospace, SFMono-Regular, monospace;
    }
    .model-tag:empty { display: none; }
    .status {
      font-size: 18px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }
    .status::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 6px var(--muted);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .status.connected::before {
      background: var(--ok);
      box-shadow: 0 0 6px var(--ok);
    }
    .status.disconnected::before {
      background: var(--err);
      box-shadow: 0 0 6px var(--err);
    }

    /* Scroll area */
    .log {
      flex: 1;
      overflow-y: auto;
      padding: 18px 4px 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
    }
    .log::-webkit-scrollbar { width: 8px; }
    .log::-webkit-scrollbar-thumb { background: var(--card-2); border-radius: 4px; }

    /* Message row */
    .row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      margin-top: 10px;
      animation: pop 0.18s ease-out;
    }
    .row.you { justify-content: flex-end; }
    .row.grouped { margin-top: 2px; }
    .row.grouped .row-avatar { visibility: hidden; }

    .row-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      background: var(--card-2);
    }
    .row-avatar.agent { background: linear-gradient(135deg, #2f81f7, #6e40c9); }

    .stack {
      display: flex;
      flex-direction: column;
      max-width: 75%;
      min-width: 0;
    }
    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius-lg);
      font-size: 21px;
      line-height: 1.45;
      word-wrap: break-word;
      position: relative;
    }
    .row.you .bubble {
      background: var(--accent);
      color: var(--accent-fg);
      border-bottom-right-radius: var(--radius-sm);
    }
    .row.agent .bubble {
      background: var(--card-2);
      color: var(--fg);
      border-bottom-left-radius: var(--radius-sm);
    }

    /* Intent tag inside agent bubble */
    .intent-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 16px;
      color: var(--muted);
      background: rgba(125, 133, 144, 0.12);
      padding: 3px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      cursor: help;
    }
    .intent-tag.ok { color: var(--ok); background: rgba(45, 164, 78, 0.12); }
    .intent-tag.err { color: var(--err); background: rgba(248, 81, 73, 0.12); }
    .intent-tag.warn { color: var(--warn); background: rgba(210, 153, 34, 0.12); }
    .intent-tag .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .summary { display: block; }
    .summary.err { color: #ffb4ad; }

    /* Timestamp */
    .ts {
      font-size: 15px;
      color: var(--muted);
      margin: 4px 8px 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .row:hover .ts { opacity: 1; }

    /* Typing indicator */
    .typing {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }
    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s infinite ease-in-out;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes blink {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-2px); }
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Welcome / examples */
    .welcome {
      text-align: center;
      color: var(--muted);
      font-size: 20px;
      margin: 32px 0 16px;
    }
    .welcome h2 {
      font-size: 24px;
      color: var(--fg);
      margin: 0 0 6px;
      font-weight: 600;
    }

    /* Composer */
    .composer-wrap {
      padding: 12px 0 16px;
      border-top: 1px solid var(--card);
      background: var(--bg);
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }
    .chip {
      font-size: 18px;
      color: var(--muted);
      background: var(--card);
      border: 1px solid transparent;
      border-radius: 14px;
      padding: 5px 11px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }
    .chip:hover {
      color: var(--fg);
      border-color: var(--accent);
      background: var(--card-2);
    }
    form {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-box {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--card-2);
      border-radius: 22px;
      display: flex;
      align-items: flex-end;
      padding: 6px 6px 6px 14px;
      transition: border-color 0.12s;
    }
    .input-box:focus-within { border-color: var(--accent); }
    #text {
      flex: 1;
      background: transparent;
      color: var(--fg);
      border: 0;
      padding: 8px 0;
      font-size: 21px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 180px;
      line-height: 1.4;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      transition: all 0.12s;
    }
    .icon-btn:hover { background: var(--card-2); color: var(--fg); }
    .icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #mic.listening {
      background: var(--err);
      color: #fff;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.6); }
      50% { box-shadow: 0 0 0 6px rgba(248, 81, 73, 0); }
    }
    #send {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 0;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      transition: transform 0.1s, opacity 0.1s;
    }
    #send:hover:not(:disabled) { transform: scale(1.05); }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-wrap">
  <div class="app">
    <header>
      <div class="avatar">P</div>
      <div class="header-text">
        <h1>Projector Agent<span class="model-tag" id="model-name"></span></h1>
        <div class="status" id="status">Checking ADB…</div>
      </div>
      <button type="button" id="panel-toggle" class="icon-btn" title="Toggle mobile log panel">📋</button>
    </header>

    <div id="log" class="log">
      <div class="welcome">
        <h2>How can I help you today?</h2>
        <div>Tell me what to do with your projectors.</div>
      </div>
    </div>

    <div class="composer-wrap">
      <div class="chips" id="chips">
        <button class="chip" data-text="Pair pro-a and pro-b and play apink.mp4">Pair &amp; play apink.mp4</button>
        <button class="chip" data-text="Play sunset.mp4">Switch to sunset.mp4</button>
        <button class="chip" data-text="Calibrate in landscape">Calibrate landscape</button>
        <button class="chip" data-text="Standby please">Standby</button>
        <button class="chip" data-text="Stop blending">End session</button>
      </div>
      <form id="form">
        <button type="button" id="mic" class="icon-btn" title="Voice input">🎤</button>
        <div class="input-box">
          <textarea id="text" rows="1" autofocus autocomplete="off"
            placeholder="Message the projector agent…"></textarea>
        </div>
        <button type="submit" id="send" title="Send">➤</button>
      </form>
    </div>
  </div>
  </div>
  <aside class="log-panel" id="log-panel">
    <div class="resize-handle" id="resize-handle" title="Drag to resize"></div>
    <div class="log-panel-header">
      <h2>Mobile logs</h2>
      <button type="button" class="icon-btn" id="log-clear" title="Clear all logs">🗑</button>
    </div>
    <div class="log-stream" id="log-stream">
      <div class="log-empty">Mobile logs from each invocation will stream here.</div>
    </div>
  </aside>

  <script>
    const log = document.getElementById('log');
    const form = document.getElementById('form');
    const input = document.getElementById('text');
    const send = document.getElementById('send');
    const mic = document.getElementById('mic');
    const chips = document.getElementById('chips');
    const logPanel = document.getElementById('log-panel');
    const logStream = document.getElementById('log-stream');
    const logClear = document.getElementById('log-clear');
    const panelToggle = document.getElementById('panel-toggle');
    const resizeHandle = document.getElementById('resize-handle');
    const statusEl = document.getElementById('status');

    /* ---- ADB device status poll ----------------------------------- */
    async function refreshAdbStatus() {
      try {
        const r = await fetch('/adb_status', { cache: 'no-store' });
        const data = await r.json();
        if (data.connected) {
          statusEl.classList.remove('disconnected');
          statusEl.classList.add('connected');
          const dev = data.devices[0] + (data.devices.length > 1
            ? ` (+${data.devices.length - 1})` : '');
          statusEl.textContent = `Connected · ${dev}`;
        } else {
          statusEl.classList.remove('connected');
          statusEl.classList.add('disconnected');
          statusEl.textContent = 'No ADB device · check USB connection';
        }
      } catch (err) {
        statusEl.classList.remove('connected');
        statusEl.classList.add('disconnected');
        statusEl.textContent = 'ADB status unavailable';
      }
    }
    refreshAdbStatus();
    setInterval(refreshAdbStatus, 4000);

    /* ---- Fetch the LLM model name once on load -------------------- */
    fetch('/model', { cache: 'no-store' })
      .then(r => r.json())
      .then(d => {
        const el = document.getElementById('model-name');
        if (d && d.model) el.textContent = d.model;
      })
      .catch(() => { /* leave the pill empty if it fails */ });

    /* ---- Log panel resize ----------------------------------------- */
    const PANEL_MIN = 280;
    const PANEL_MAX_RATIO = 0.7; // never let panel eat more than 70% of viewport
    const PANEL_STORAGE_KEY = 'logPanelWidth';

    function applyPanelWidth(w) {
      const max = Math.floor(window.innerWidth * PANEL_MAX_RATIO);
      const clamped = Math.max(PANEL_MIN, Math.min(max, w));
      logPanel.style.width = clamped + 'px';
      return clamped;
    }
    const savedWidth = parseInt(localStorage.getItem(PANEL_STORAGE_KEY) || '0', 10);
    if (savedWidth) applyPanelWidth(savedWidth);

    resizeHandle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const startX = e.clientX;
      const startW = logPanel.getBoundingClientRect().width;
      document.body.classList.add('resizing');
      resizeHandle.classList.add('dragging');
      function onMove(ev) {
        // Handle lives on panel's LEFT edge, so dragging right shrinks the panel.
        const next = startW - (ev.clientX - startX);
        applyPanelWidth(next);
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        document.body.classList.remove('resizing');
        resizeHandle.classList.remove('dragging');
        const current = Math.round(logPanel.getBoundingClientRect().width);
        localStorage.setItem(PANEL_STORAGE_KEY, String(current));
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    // Double-click the handle to reset to the default width.
    resizeHandle.addEventListener('dblclick', () => {
      logPanel.style.width = '';
      localStorage.removeItem(PANEL_STORAGE_KEY);
    });
    // Re-clamp on viewport resize so the panel can't exceed PANEL_MAX_RATIO.
    window.addEventListener('resize', () => {
      const current = logPanel.getBoundingClientRect().width;
      if (current > 0) applyPanelWidth(current);
    });

    let lastSender = null;

    /* ---- Mobile log panel (right sidebar) -------------------------- */

    function openLogSection(intentName) {
      // Wipe prior invocation's logs so the panel only ever shows the current
      // request — keeps the trace focused and avoids unbounded scrollback.
      logStream.innerHTML = '';
      const section = document.createElement('div');
      section.className = 'log-section';
      const head = document.createElement('div');
      head.className = 'log-section-head';
      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = intentName || '…';
      const status = document.createElement('span');
      status.className = 'status running';
      status.textContent = 'running';
      head.appendChild(name);
      head.appendChild(status);
      section.appendChild(head);
      logStream.appendChild(section);
      logStream.scrollTop = logStream.scrollHeight;
      let count = 0;
      return {
        setName(n) { name.textContent = n; },
        addLine(line) {
          count++;
          const el = document.createElement('div');
          el.className = 'log-line';
          // Pull "LEVEL" out of the formatted line ("HH:MM:SS L Tag: msg") to
          // colour-code by severity. Falls back to plain rendering otherwise.
          const m = line.match(/^(\d{2}:\d{2}:\d{2})\s+([VDIWEF])\s+(.*)$/);
          if (m) {
            el.classList.add(m[2].toLowerCase());
            el.innerHTML = `<span class="lvl">${m[2]}</span>${escapeHtml(m[1])} ${escapeHtml(m[3])}`;
          } else {
            el.textContent = line;
          }
          section.appendChild(el);
          logStream.scrollTop = logStream.scrollHeight;
        },
        finalize(ok) {
          status.className = `status ${ok ? 'ok' : 'err'}`;
          status.textContent = ok ? `ok · ${count} lines` : `failed · ${count} lines`;
        },
        markError() {
          status.className = 'status err';
          status.textContent = 'error';
        },
      };
    }

    logClear.addEventListener('click', () => {
      logStream.innerHTML = '';
      const empty = document.createElement('div');
      empty.className = 'log-empty';
      empty.textContent = 'Mobile logs from each invocation will stream here.';
      logStream.appendChild(empty);
    });
    panelToggle.addEventListener('click', () => {
      // On wide viewports the panel is open by default — clicking collapses it.
      // On narrow viewports it's hidden by default — clicking forces it open.
      if (window.innerWidth <= 1100) {
        logPanel.classList.toggle('force-open');
      } else {
        logPanel.classList.toggle('collapsed');
      }
    });

    function fmtTime(d = new Date()) {
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function scrollDown() {
      requestAnimationFrame(() => { log.scrollTop = log.scrollHeight; });
    }

    function addUserBubble(text) {
      const grouped = lastSender === 'you';
      const row = document.createElement('div');
      row.className = `row you${grouped ? ' grouped' : ''}`;
      row.innerHTML = `
        <div class="stack">
          <div class="bubble">${escapeHtml(text)}</div>
          <div class="ts" style="text-align:right">${fmtTime()}</div>
        </div>
        <div class="row-avatar">🧑</div>
      `;
      log.appendChild(row);
      lastSender = 'you';
      scrollDown();
    }

    function createStreamingAgentBubble() {
      const grouped = lastSender === 'agent';
      const row = document.createElement('div');
      row.className = `row agent${grouped ? ' grouped' : ''}`;

      const avatar = document.createElement('div');
      avatar.className = 'row-avatar agent';
      avatar.textContent = '🤖';
      const wrap = document.createElement('div');
      wrap.className = 'stack';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      const intentEl = document.createElement('div');
      intentEl.className = 'intent-tag';
      intentEl.innerHTML = '<span class="dot"></span>thinking…';

      const summaryEl = document.createElement('div');
      summaryEl.className = 'summary';
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      summaryEl.appendChild(typing);

      bubble.appendChild(intentEl);
      bubble.appendChild(summaryEl);

      const ts = document.createElement('div');
      ts.className = 'ts';
      ts.textContent = fmtTime();

      wrap.appendChild(bubble);
      wrap.appendChild(ts);
      row.appendChild(avatar);
      row.appendChild(wrap);
      log.appendChild(row);
      lastSender = 'agent';
      scrollDown();

      // Each invocation gets its own section in the right-side log panel.
      const section = openLogSection('thinking…');
      let finalized = false;

      return {
        handle(ev) {
          if (ev.type === 'intent') {
            intentEl.innerHTML = `<span class="dot"></span>${ev.intent.name}`;
            intentEl.title = JSON.stringify(ev.intent.args, null, 2);
            section.setName(ev.intent.name);
          } else if (ev.type === 'log') {
            section.addLine(ev.line);
          } else if (ev.type === 'result') {
            finalized = true;
            typing.remove();
            summaryEl.textContent = ev.summary;
            if (!ev.ok) summaryEl.classList.add('err');
            intentEl.classList.add(ev.ok ? 'ok' : 'err');
            section.finalize(ev.ok);
          }
        },
        error(msg) {
          if (finalized) return;
          typing.remove();
          intentEl.className = 'intent-tag err';
          intentEl.innerHTML = '<span class="dot"></span>error';
          summaryEl.classList.add('err');
          summaryEl.textContent = msg;
          section.markError();
        },
      };
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function autosize() {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    }
    input.addEventListener('input', autosize);

    // Submit on Enter, newline on Shift+Enter
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    chips.addEventListener('click', (e) => {
      const btn = e.target.closest('.chip');
      if (!btn) return;
      input.value = btn.dataset.text;
      autosize();
      input.focus();
    });

    async function sendMessage(text) {
      addUserBubble(text);
      send.disabled = true;
      const slot = createStreamingAgentBubble();
      try {
        const resp = await fetch('/invoke', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          slot.error(data.error || `HTTP ${resp.status}`);
          return;
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          // Process every complete line and keep any partial tail in `buf`.
          let idx;
          while ((idx = buf.indexOf('\n')) >= 0) {
            const line = buf.slice(0, idx).trim();
            buf = buf.slice(idx + 1);
            if (!line) continue;
            try { slot.handle(JSON.parse(line)); }
            catch (e) { console.error('bad event', line, e); }
          }
        }
        if (buf.trim()) {
          try { slot.handle(JSON.parse(buf)); } catch (e) {}
        }
      } catch (err) {
        slot.error(String(err));
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      autosize();
      await sendMessage(text);
    });

    // Browser voice input (Chrome / Edge). Falls back silently if unsupported.
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      const recog = new SR();
      recog.lang = 'en-US';
      recog.interimResults = false;
      recog.maxAlternatives = 1;
      mic.addEventListener('click', () => {
        if (mic.classList.contains('listening')) {
          recog.stop();
        } else {
          mic.classList.add('listening');
          recog.start();
        }
      });
      recog.addEventListener('result', (e) => {
        const text = e.results[0][0].transcript;
        input.value = text;
        autosize();
        mic.classList.remove('listening');
        form.requestSubmit();
      });
      recog.addEventListener('end', () => mic.classList.remove('listening'));
      recog.addEventListener('error', () => mic.classList.remove('listening'));
    } else {
      mic.disabled = true;
      mic.title = 'Voice input not supported in this browser';
    }
  </script>
</body>
</html>
